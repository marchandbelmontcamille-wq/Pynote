name: Build & Release Pynote

on:
  push:
    tags:
      - "v*"
      - "0.*"

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Detect build type
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          if ($tag -like "v*") {
            "APP_ENV=prod" | Out-File -FilePath build_type.txt -Encoding utf8
            "IS_PRE=false" | Add-Content $env:GITHUB_ENV
            "ZIP=Pynote-windows.zip" | Add-Content $env:GITHUB_ENV
          } else {
            "APP_ENV=dev" | Out-File -FilePath build_type.txt -Encoding utf8
            "IS_PRE=true" | Add-Content $env:GITHUB_ENV
            "ZIP=Pynote-dev-windows.zip" | Add-Content $env:GITHUB_ENV
          }

      - name: Build EXE
        run: pyinstaller pynote.spec --noconfirm

      - name: Package
        run: Compress-Archive -Path dist\Pynote\* -DestinationPath ${{ env.ZIP }}

      - name: Cleanup old releases and drafts
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          # Supprimer toutes les releases (publiées + drafts) liées à ce tag
          $releases = gh api "repos/${{ github.repository }}/releases" --paginate | ConvertFrom-Json
          foreach ($r in $releases) {
            if ($r.tag_name -eq $tag) {
              Write-Host "Deleting release $($r.id) ($($r.tag_name))..."
              gh api -X DELETE "repos/${{ github.repository }}/releases/$($r.id)"
            }
          }

      - name: Create Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $zip = "${{ env.ZIP }}"
          $pre = if ("${{ env.IS_PRE }}" -eq "true") { "--prerelease" } else { "" }
          $body = "## Pynote $tag`n`n### Installation (Windows)`n1. Telechargez **$zip**`n2. Extrayez le dossier`n3. Double-cliquez sur **Pynote.exe**`n4. Saisissez l URL Pronote + vos identifiants`n`n> Aucune installation de Python requise."
          gh release create $tag $zip --title "Pynote $tag" --notes $body $pre
