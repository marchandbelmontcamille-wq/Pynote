name: Build & Release Pynote

on:
  push:
    tags:
      - "v*.*.*"        # Release stable (prod) — ex: v1.0.0
      - "dev-*"         # Pre-release (dev) — ex: dev-0.1.0

permissions:
  contents: write

jobs:
  build-windows:
    name: Build Windows EXE
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Set release variables (stable)
        if: startsWith(github.ref_name, 'v')
        run: |
          echo "IS_PRERELEASE=false" >> $env:GITHUB_ENV
          echo "ZIP_NAME=Pynote-windows.zip" >> $env:GITHUB_ENV
          echo "RELEASE_LABEL=Version stable" >> $env:GITHUB_ENV
          Set-Content -Path build_type.txt -Value "prod" -Encoding UTF8

      - name: Set release variables (dev)
        if: startsWith(github.ref_name, 'dev-')
        run: |
          echo "IS_PRERELEASE=true" >> $env:GITHUB_ENV
          echo "ZIP_NAME=Pynote-dev-windows.zip" >> $env:GITHUB_ENV
          echo "RELEASE_LABEL=Dev Preview" >> $env:GITHUB_ENV
          Set-Content -Path build_type.txt -Value "dev" -Encoding UTF8

      - name: Build with PyInstaller
        run: pyinstaller pynote.spec --noconfirm

      - name: Zip the output
        run: |
          Compress-Archive -Path dist\Pynote\* -DestinationPath ${{ env.ZIP_NAME }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Pynote ${{ github.ref_name }} (${{ env.RELEASE_LABEL }})"
          prerelease: ${{ env.IS_PRERELEASE }}
          body: |
            ## 🎓 Pynote ${{ github.ref_name }}

            ### Installation
            1. Téléchargez **${{ env.ZIP_NAME }}**
            2. Extrayez le dossier où vous voulez
            3. Double-cliquez sur **Pynote.exe**
            4. Entrez l'URL Pronote de votre établissement, votre identifiant et mot de passe

            > Aucune installation de Python requise.
          files: ${{ env.ZIP_NAME }}
          draft: false
