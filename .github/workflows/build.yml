name: Build & Release Pynote

on:
  push:
    tags:
      - "v*"
      - "0.*"

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Detect build type
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          if ($tag -like "v*") {
            "prod" | Out-File -FilePath build_type.txt -Encoding utf8
            "IS_PRE=false" | Add-Content $env:GITHUB_ENV
            "INSTALLER=Pynote-Setup-$tag.exe" | Add-Content $env:GITHUB_ENV
          } else {
            "dev" | Out-File -FilePath build_type.txt -Encoding utf8
            "IS_PRE=true" | Add-Content $env:GITHUB_ENV
            "INSTALLER=Pynote-Dev-Setup-$tag.exe" | Add-Content $env:GITHUB_ENV
          }

      - name: Build EXE
        run: pyinstaller pynote.spec --noconfirm

      - name: Install Inno Setup
        run: |
          choco install innosetup --yes --no-progress

      - name: Compile installer
        shell: pwsh
        run: |
          $iscc = "C:\Program Files (x86)\Inno Setup 6\ISCC.exe"
          $version = (Get-Content VERSION).Trim()
          $basename = "${{ env.INSTALLER }}" -replace '\.exe$', ''
          & $iscc /O"installer_output" /F"$basename" "/DMyAppVersion=$version" installer\pynote.iss
          if ($LASTEXITCODE -ne 0) { throw "Inno Setup failed" }
          Write-Host "Files in installer_output:"
          Get-ChildItem installer_output

      - name: Cleanup old releases and drafts
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $releases = gh api "repos/${{ github.repository }}/releases" --paginate | ConvertFrom-Json
          foreach ($r in $releases) {
            if ($r.tag_name -eq $tag) {
              Write-Host "Deleting release $($r.id)..."
              gh api -X DELETE "repos/${{ github.repository }}/releases/$($r.id)"
            }
          }

      - name: Create Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $installer = "installer_output\${{ env.INSTALLER }}"
          $pre = if ("${{ env.IS_PRE }}" -eq "true") { "--prerelease" } else { "" }
          $body = "## Pynote $tag`n`n### Installation (Windows)`n1. Telechargez **${{ env.INSTALLER }}**`n2. Double-cliquez et suivez le wizard`n3. Lancez Pynote depuis le Bureau ou le Menu Demarrer`n`n> Aucune installation de Python requise."
          gh release create $tag $installer --title "Pynote $tag" --notes $body $pre
